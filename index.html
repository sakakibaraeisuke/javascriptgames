<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Making your first Phaser 3 Game - Part 1</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 300 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('star', 'assets/star.png');
        this.load.image('bomb', 'assets/bomb.png');
        this.load.audio('coinSound', 'assets/coin001.mp3');
        this.load.audio('explosionSound', 'assets/Explosion01.mp3');
        this.load.spritesheet('dude', 
            'assets/dude.png',
            { frameWidth: 32, frameHeight: 48 }
        );
    }

    function create ()
   
    {

//背景の作成
        this.add.image(0, 0, 'sky').setOrigin(0,0)
//スコアの表示
    var score = 0;
    var scoreText;
    scoreText = this.add.text(16, 16, 'score: 0', { fontSize: '32px', fill: '#000' });

//プラットフォームの作成。static物理
        var platforms;
        platforms = this.physics.add.staticGroup();//動かない足場のグループをphaserのstaticGroup()関数で作っている。後で、platforms.~~~で動かないオブジェクトを順次足していくことができる。
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();//setScale(2)は縦横サイズ2倍。refreshBody()葉当たり判定をサイズに合わせて再設定する関数。
        platforms.create(600, 400, 'ground');
        platforms.create(50, 250, 'ground');
        platforms.create(750, 220, 'ground');


//プレイヤーの作成
        player = this.physics.add.sprite(100, 450, 'dude');

        player.setBounce(0.2);//反発力
        player.setCollideWorldBounds(true);//世界の境界で衝突
        player.body.setGravityY(1000)
        //左向きに歩く時の連続スプライト変化
        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1//マイナス1は無限ループ
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });
        //地面とプレーヤーの衝突判定の設定
        this.physics.add.collider(player, platforms);
        cursors = this.input.keyboard.createCursorKeys();

        //星の作成
        stars = this.physics.add.group({
            key: 'star',
            repeat: 11,
            setXY: { x: 12, y: 0, stepX: 70 }
        });

        stars.children.iterate(function (child) {

            child.setBounceY(Phaser.Math.FloatBetween(0.2, 1));

        });
        this.physics.add.collider(stars, platforms);

        // 効果音オブジェクト
        this.coinSound = this.sound.add('coinSound');
        this.explosionSound = this.sound.add('explosionSound');
        
        
        //コインと接触した際の処理
        this.physics.add.overlap(player, stars, collectStar, null, this);//collectStar関数を呼び出す、nullは追加の条件の記述,thisは関数を呼び出すときのコンテキストをこのシーンに限定する
        function collectStar (player, star){
            star.disableBody(true, true);
            // 効果音を鳴らす
            this.coinSound.play();
            score += 10;
            scoreText.setText('Score: ' + score);

            if (stars.countActive(true) === 0)
            {
                stars.children.iterate(function (child) {

                    child.enableBody(true, child.x, 0, true, true);

                });

                var x = (player.x < 400) ? Phaser.Math.Between(400, 800) : Phaser.Math.Between(0, 400);

                var bomb = bombs.create(x, 16, 'bomb');
                bomb.setBounce(1);
                bomb.setCollideWorldBounds(true);
                bomb.setVelocity(Phaser.Math.Between(-200, 200), 20);

            }
        }


//爆弾の作成
        bombs = this.physics.add.group();
        this.physics.add.collider(bombs, platforms);
        this.physics.add.collider(player, bombs, hitBomb, null, this);
        function hitBomb (player, bomb)
        {
            this.physics.pause();
            this.explosionSound.play();
            player.setTint(0xff0000);
            player.anims.play('turn');
            gameOver = true;
        }


    }

    function update ()
    {
        if (cursors.left.isDown){
            player.setVelocityX(-200);
            player.anims.play('left', true);
        }

        else if (cursors.right.isDown){
            player.setVelocityX(200);
            player.anims.play('right', true);
        }
        else{
            player.setVelocityX(0);
            player.anims.play('turn');
        }

        if (cursors.up.isDown && player.body.touching.down){
            player.setVelocityY(-800);
        }
    }

</script>

</body>
</html>
